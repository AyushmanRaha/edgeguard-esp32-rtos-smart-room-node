name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-test-build:
    name: Verify, test, and build firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify repository integrity
        run: python tools/verify_repo.py

      - name: Run native control-logic unit tests
        run: pio test -e native

      - name: Build ESP32 firmware
        run: pio run -e esp32doit-devkit-v1

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgeguard-esp32-firmware
          retention-days: 14
          if-no-files-found: error
          path: |
            .pio/build/esp32doit-devkit-v1/firmware.bin
            .pio/build/esp32doit-devkit-v1/firmware.elf
            .pio/build/esp32doit-devkit-v1/firmware.map
