name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware:
    name: PlatformIO firmware build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-
      - name: Install PlatformIO Core
        run: python -m pip install -r requirements.txt
      - name: Build firmware
        run: pio run
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgeguard-esp32-firmware
          if-no-files-found: warn
          path: |
            .pio/build/**/firmware.bin
            .pio/build/**/firmware.elf
            .pio/build/**/firmware.map

  docs-check:
    name: Repository documentation checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify required docs and no committed secrets
        run: |
          test -f README.md
          test -d docs
          test -f docs/architecture.md
          test -f docs/hardware.md
          test -f docs/api.md
          test -f docs/development.md
          test -f docs/troubleshooting.md
          test -f docs/ci.md
          ! find . -name secrets.h -type f | grep -q .
          if grep -R "YOUR_REAL_WIFI\|real-password\|actual-password" -n README.md docs firmware; then exit 1; fi
