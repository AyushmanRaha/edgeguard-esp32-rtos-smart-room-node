[platformio]
src_dir = firmware/EdgeGuard_ESP32

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
; Conservative upload speed improves reliability on CH340/CP210x USB-serial boards,
; especially when the board is connected through hubs or a breadboarded circuit.
upload_speed = 115200
lib_deps =
  adafruit/DHT sensor library@^1.4.6
  adafruit/Adafruit Unified Sensor@^1.1.15
build_flags =
  -Wall

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
  -std=gnu++17
  -Wall
  -Itest/native_stubs
build_src_filter =
  -<*>
  +<control_logic.cpp>
